<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Khorooch | Home</title>
    <!-- favicon -->
    <link rel="shortcut icon" href="assets/logo-use.png" type="image/x-icon">
    <!-- tailwind and daisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- all themes of daisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <!-- fontawesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">


    <!-- styles -->
    <style>
        * {
            font-family: "Outfit", sans-serif;
            font-optical-sizing: auto;
        }
    </style>
</head>

<body class="min-h-screen max-w-md bg-base-200 mx-auto">
    <!-- header section -->
    <header class="border-b-2 border-gray-300">
        <section class="w-11/12 mx-auto py-4 px-0 flex justify-between items-center">
            <div class="left flex justify-between items-center gap-2">
                <div class="logo max-w-14">
                    <img src="assets/logo-use.png" alt="logo">
                </div>
                <div>
                    <h3 class="font-extrabold text-lg">45000</h3>
                    <p class="text-sm text-gray-400">Available Balance</p>
                </div>
            </div>
            <div class="right">
                <a href="/index.html" class="btn btn-outline text-sm text-gray-400 font-normal rounded-xl">
                    <i class="fa-regular fa-square-caret-left"></i>
                    <span>Log Out</span>
                </a>

            </div>
        </section>
    </header>


    <!-- Content Section -->
    <section class="w-11/12 mx-auto py-8 px-2">
        <div class="content-info">
            <h2 class="text-2xl font-bol text-black pb-3">Welcome to Kh<span class="text-orange-500">o</span>r<span
                    class="text-lime-500">oo</span>ch</h2>
            <p class="text-gray-400 font-normal">Enjoy easy and convenient financial services with us. Cashout charge is
                low and </p>
        </div>
        <div class="content grid grid-cols-3 py-6 gap-4 auto-rows-fr">
            <button class="grid grid-cols border border-gray-300 h-full p-6 cursor-pointer btn btn-soft content-center justify-items-center rounded-2xl">
                <img src="assets/opt-1.png" alt="add-money">
                <p class="text-sm font-normal text-gray-500">Add Money</p>
            </button>
            <button class="grid grid-cols border border-gray-300 h-full p-6 cursor-pointer btn btn-soft content-center justify-items-center rounded-2xl">
                <img src="assets/opt-2.png" alt="Cashout">
                <p class="text-sm font-normal text-gray-500">Cashout</p>
            </button>
            <button class="grid grid-cols border border-gray-300 h-full p-6 cursor-pointer btn btn-soft content-center justify-items-center rounded-2xl">
                <img src="assets/opt-3.png" alt="transfer-money">
                <p class="text-sm font-normal text-gray-500">Transfer Money</p>
            </button>
            <button class="grid grid-cols border border-gray-300 h-full p-6 cursor-pointer btn btn-soft content-center justify-items-center rounded-2xl">
                <img src="assets/opt-4.png" alt="Get Bonus">
                <p class="text-sm font-normal text-gray-500">Get Bonus</p>
            </button>
            <button class="grid grid-cols border border-gray-300 h-full p-6 cursor-pointer btn btn-soft content-center justify-items-center rounded-2xl">
                <img src="assets/opt-5.png" alt="Pay Bill">
                <p class="text-sm font-normal text-gray-500">Pay Bill</p>
            </button>
            <button class="grid grid-cols border border-gray-300 h-full p-6 cursor-pointer btn btn-soft content-center justify-items-center rounded-2xl">
                <img src="assets/opt-6.png" alt="Transactions">
                <p class="text-sm font-normal text-gray-500">Transactions</p>
            </button>
        </div>
    </section>
</body>

</html>
